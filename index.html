<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>DePix</title>

  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.eulen.app https://depix.eulen.app; connect-src https://depix-backend.vercel.app; style-src 'self'" />
  <meta name="theme-color" content="#0f3d3e" />

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

<main class="page">
  <div class="card">
    <h1>Gerar QR Code PIX</h1>

    <div id="mensagem" class="mensagem"></div>

    <input id="valor" placeholder="R$ 0,00" inputmode="numeric" />
    <input id="endereco" placeholder="Endereço Liquid" />

    <button id="btnGerar">Gerar QR Code</button>

    <div id="loading" class="hidden">Gerando QR Code…</div>

    <div id="resultado" class="resultado hidden">
      <img id="qrImage" />
      <p id="qrId"></p>
      <button id="btnCopy">PIX copia e cola</button>
      <button id="btnReset" class="secondary">Novo pagamento</button>
    </div>
  </div>
</main>

<!-- Botão instalar -->
<button id="installBtn" class="install-btn">
  ⬇️ Instalar o app
</button>

<!-- Modal de instruções -->
<div id="installModal" class="modal hidden">
  <div class="modal-box">
    <h2>Instalar aplicativo</h2>
    <p>Se o navegador não mostrar a instalação automática:</p>
    <ul>
      <li>Abra o menu do navegador</li>
      <li>Escolha <b>Instalar app</b> ou <b>Adicionar à tela inicial</b></li>
    </ul>
    <button id="closeModal">Entendi</button>
  </div>
</div>

<div id="toast" class="toast hidden">
  Código copiado. Cole no app do seu banco.
</div>

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./service-worker.js");
  }
</script>

<script src="script.js"></script>
</body>
</html>
