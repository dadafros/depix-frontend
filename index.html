<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>DePix – Gerar QR Code PIX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- PWA / Icons -->
  <link rel="icon" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">

    <h1>Gerar QR Code PIX</h1>

    <!-- MENSAGEM DE ERRO / INFO (SEMPRE VISÍVEL) -->
    <div id="mensagem" class="mensagem"></div>

    <!-- FORM -->
    <form id="form">
      <input
        id="valor"
        type="text"
        placeholder="R$ 0,00"
        autocomplete="off"
      />

      <input
        id="endereco"
        type="text"
        placeholder="Endereço Liquid"
        autocomplete="off"
      />

      <button type="button" id="btnGerar">
        Gerar QR Code
      </button>
    </form>

    <!-- LOADING -->
    <div id="loading" class="hidden">
      <div class="spinner"></div>
      <p>Gerando QR Code...</p>
    </div>

    <!-- RESULTADO -->
    <div id="resultado" class="hidden">
      <img id="qrImage" alt="QR Code PIX" />

      <p id="qrId" class="qr-id"></p>

      <button id="btnCopy">PIX copia e cola</button>
      <button id="btnReset" class="secondary">Novo pagamento</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
