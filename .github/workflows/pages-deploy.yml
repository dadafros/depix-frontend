# Deploys the DePix frontend (legacy static files + `dist/` wallet bundle) to
# GitHub Pages. REQUIRES a one-time repo Settings change BEFORE this workflow
# serves traffic: Settings -> Pages -> Build and deployment -> Source = GitHub
# Actions (currently "Deploy from a branch"). Until that toggle is flipped
# post-merge, this workflow runs successfully but its output is NOT served —
# the branch-based deploy continues. `workflow_dispatch` is kept so a
# maintainer can re-run manually after flipping the setting.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build wallet bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build wallet bundle
        run: npm run build

      - name: Stage Pages artifact
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='_site' \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='tests' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='build.mjs' \
            --exclude='eslint.config.js' \
            --exclude='vitest.config.*' \
            --exclude='*.md' \
            --exclude='.gitignore' \
            --exclude='.claude' \
            ./ _site/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
